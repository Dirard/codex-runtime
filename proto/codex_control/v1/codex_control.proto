syntax = "proto3";

package codex.control.v1;

option go_package = "github.com/Dirard/codex-runtime/gen/codex/control/v1;codexcontrolv1";

service CodexControl {
  rpc StartTask(StartTaskRequest) returns (StartTaskResponse);
  rpc StreamTask(StreamTaskRequest) returns (stream StreamTaskResponse);
  rpc RespondPendingRequest(RespondPendingRequestRequest) returns (RespondPendingRequestResponse);
  rpc InterruptTask(InterruptTaskRequest) returns (InterruptTaskResponse);
  rpc GetTaskStatus(GetTaskStatusRequest) returns (GetTaskStatusResponse);
}

service ChatRuntimeService {
  rpc StartChatRun(StartChatRunRequest) returns (StartChatRunResponse);
  rpc GetChat(GetChatRequest) returns (GetChatResponse);
  rpc RunChatTurn(RunChatTurnRequest) returns (RunChatTurnResponse);
  rpc GetChatStatus(GetChatStatusRequest) returns (GetChatStatusResponse);
  rpc GetChatHistory(GetChatHistoryRequest) returns (GetChatHistoryResponse);
  rpc StreamChatEvents(StreamChatEventsRequest) returns (stream StreamChatEventsResponse);
  rpc RespondChatPending(RespondChatPendingRequest) returns (RespondChatPendingResponse);
  rpc InterruptChatRun(InterruptChatRunRequest) returns (InterruptChatRunResponse);
}

service WorkflowRuntimeService {
  rpc InitWorkflow(InitWorkflowRequest) returns (InitWorkflowResponse);
  rpc GetWorkflow(GetWorkflowRequest) returns (GetWorkflowResponse);
  rpc GetWorkflowStatus(GetWorkflowStatusRequest) returns (GetWorkflowStatusResponse);
  rpc RestartWorkflow(RestartWorkflowRequest) returns (RestartWorkflowResponse);
  rpc DeleteWorkflow(DeleteWorkflowRequest) returns (DeleteWorkflowResponse);
  rpc StartWorkflowChatRun(StartWorkflowChatRunRequest) returns (StartWorkflowChatRunResponse);
  rpc RunWorkflowChatTurn(RunWorkflowChatTurnRequest) returns (RunWorkflowChatTurnResponse);
  rpc GetWorkflowChat(GetWorkflowChatRequest) returns (GetWorkflowChatResponse);
  rpc GetWorkflowChatHistory(GetWorkflowChatHistoryRequest) returns (GetWorkflowChatHistoryResponse);
  rpc StreamWorkflowChatEvents(StreamWorkflowChatEventsRequest) returns (stream StreamWorkflowChatEventsResponse);
  rpc RespondWorkflowChatPending(RespondWorkflowChatPendingRequest) returns (RespondWorkflowChatPendingResponse);
  rpc InterruptWorkflowChatRun(InterruptWorkflowChatRunRequest) returns (InterruptWorkflowChatRunResponse);
}

message ChatRuntimeContext {
  string session_group_id = 1;
  string workspace_id = 2;
}

message WorkflowSelector {
  string namespace = 1;
  string workflow_id = 2;
}

message WorkflowPackage {
  uint32 schema_version = 1;
  WorkflowSelector workflow = 2;
  string package_fingerprint = 3;
  repeated WorkflowPackageFile files = 4;
  uint64 total_size_bytes = 5;
  map<string, string> client_metadata = 6;
}

message WorkflowPackageFile {
  string relative_path = 1;
  bytes contents = 2;
  uint64 size_bytes = 3;
  string sha256 = 4;
  bool executable = 5;
}

message InitWorkflowRequest {
  WorkflowPackage workflow_package = 1;
  string client_request_id = 2;
  string idempotency_key = 3;
  bool allow_mcp_reload = 4;
}

message InitWorkflowResponse {
  Workflow workflow = 1;
  WorkflowStatus status = 2;
  bool created = 3;
  bool updated = 4;
  bool no_op = 5;
  bool restart_required = 6;
  bool mcp_reload_applied = 7;
}

message GetWorkflowRequest {
  WorkflowSelector workflow = 1;
}

message GetWorkflowResponse {
  Workflow workflow = 1;
  WorkflowStatus status = 2;
}

message GetWorkflowStatusRequest {
  WorkflowSelector workflow = 1;
}

message GetWorkflowStatusResponse {
  WorkflowStatus status = 1;
}

message RestartWorkflowRequest {
  WorkflowSelector workflow = 1;
  bool force = 2;
  string client_request_id = 3;
  string idempotency_key = 4;
}

message RestartWorkflowResponse {
  WorkflowStatus status = 1;
  bool restart_started = 2;
  bool restart_completed = 3;
  bool active_work_interrupted = 4;
}

message DeleteWorkflowRequest {
  WorkflowSelector workflow = 1;
  bool force = 2;
  bool delete_materialized_state = 3;
  bool cleanup_runtime = 4;
  string client_request_id = 5;
  string idempotency_key = 6;
}

message DeleteWorkflowResponse {
  WorkflowStatus status = 1;
  bool deleted = 2;
  bool cleanup_scheduled = 3;
  bool active_work_refused = 4;
}

message Workflow {
  WorkflowSelector workflow = 1;
  string storage_key = 2;
  string active_package_fingerprint = 3;
  string pending_package_fingerprint = 4;
  string previous_package_fingerprint = 5;
  WorkflowLifecycle lifecycle = 6;
  bool restart_required = 7;
  int64 created_at_unix_ms = 8;
  int64 updated_at_unix_ms = 9;
  WorkflowCapabilitySet capabilities = 10;
}

message WorkflowStatus {
  WorkflowSelector workflow = 1;
  WorkflowLifecycle lifecycle = 2;
  string active_package_fingerprint = 3;
  string pending_package_fingerprint = 4;
  string previous_package_fingerprint = 5;
  bool restart_required = 6;
  WorkflowMcpReloadState mcp_reload_state = 7;
  string process_epoch = 8;
  repeated WorkflowActiveWork active_work = 9;
  WorkflowErrorDetails last_error = 10;
  WorkflowCapabilitySet capabilities = 11;
}

message WorkflowCapabilitySet {
  ChatCapabilityState init = 1;
  ChatCapabilityState status = 2;
  ChatCapabilityState restart = 3;
  ChatCapabilityState delete = 4;
  ChatCapabilityState run = 5;
  ChatCapabilityState history = 6;
  ChatCapabilityState event_stream = 7;
  ChatCapabilityState mcp_reload = 8;
}

message WorkflowActiveWork {
  string chat_id = 1;
  string run_id = 2;
  ChatTurnLifecycle run_lifecycle = 3;
  repeated ChatPendingRequest pending_requests = 4;
}

message WorkflowErrorDetails {
  WorkflowOutcomeCategory outcome = 1;
  WorkflowErrorCode code = 2;
  string reason = 3;
  string display_message = 4;
  bool retryable = 5;
  string next_action = 6;
  WorkflowSelector workflow = 7;
  string chat_id = 8;
  string run_id = 9;
  map<string, string> safe_metadata = 10;
}

message StartWorkflowChatRunRequest {
  WorkflowSelector workflow = 1;
  string prompt = 2;
  repeated ContextBlock context_blocks = 3;
  string client_message_id = 4;
  string idempotency_key = 5;
  map<string, string> ui_correlation_metadata = 6;
}

message StartWorkflowChatRunResponse {
  WorkflowSelector workflow = 1;
  string chat_id = 2;
  string run_id = 3;
  ChatStatus status = 4;
  uint64 last_event_id = 5;
  string event_cursor = 6;
  bool first_turn_accepted = 7;
  ChatCapabilitySet capabilities = 8;
}

message RunWorkflowChatTurnRequest {
  WorkflowSelector workflow = 1;
  string chat_id = 2;
  string prompt = 3;
  repeated ContextBlock context_blocks = 4;
  string client_message_id = 5;
  string idempotency_key = 6;
}

message RunWorkflowChatTurnResponse {
  WorkflowSelector workflow = 1;
  string chat_id = 2;
  string run_id = 3;
  ChatStatus status = 4;
  uint64 last_event_id = 5;
  string event_cursor = 6;
  bool turn_accepted = 7;
}

message GetWorkflowChatRequest {
  WorkflowSelector workflow = 1;
  string chat_id = 2;
}

message GetWorkflowChatResponse {
  WorkflowSelector workflow = 1;
  Chat chat = 2;
  ChatStatus status = 3;
}

message GetWorkflowChatHistoryRequest {
  WorkflowSelector workflow = 1;
  string chat_id = 2;
  ChatHistoryDepth requested_depth = 3;
  string cursor = 4;
  uint32 limit = 5;
  ChatHistorySortDirection sort_direction = 6;
}

message GetWorkflowChatHistoryResponse {
  WorkflowSelector workflow = 1;
  string chat_id = 2;
  repeated ChatTurnSummary turns = 3;
  string next_cursor = 4;
  string backwards_cursor = 5;
  ChatHistoryDepth returned_depth = 6;
  ChatCapabilityState capability = 7;
  ChatNarrowedOutcome narrowed = 8;
}

message StreamWorkflowChatEventsRequest {
  WorkflowSelector workflow = 1;
  string chat_id = 2;
  oneof cursor {
    ChatFromStartCursor from_start = 3;
    uint64 after_event_id = 4;
    string after_event_cursor = 5;
  }
  string client_subscriber_id = 6;
}

message StreamWorkflowChatEventsResponse {
  WorkflowSelector workflow = 1;
  oneof payload {
    ChatEvent event = 2;
    ChatReplayNotice replay_notice = 3;
    ChatNarrowedOutcome narrowed = 4;
  }
}

message RespondWorkflowChatPendingRequest {
  WorkflowSelector workflow = 1;
  string chat_id = 2;
  string pending_request_id = 3;
  string client_response_id = 4;
  string idempotency_key = 5;
  oneof response {
    ApprovalPendingResponse approval = 6;
    PermissionsPendingResponse permissions = 7;
    McpElicitationPendingResponse mcp_elicitation = 8;
    ToolUserInputPendingResponse tool_user_input = 9;
  }
}

message RespondWorkflowChatPendingResponse {
  WorkflowSelector workflow = 1;
  string chat_id = 2;
  string run_id = 3;
  string pending_request_id = 4;
  string client_response_id = 5;
  bool accepted = 6;
  bool already_applied = 7;
  uint64 last_event_id = 8;
  ChatStatus status = 9;
}

message InterruptWorkflowChatRunRequest {
  WorkflowSelector workflow = 1;
  string chat_id = 2;
  string run_id = 3;
  string client_request_id = 4;
  string idempotency_key = 5;
}

message InterruptWorkflowChatRunResponse {
  WorkflowSelector workflow = 1;
  string chat_id = 2;
  string run_id = 3;
  ChatStatus status = 4;
  bool interrupt_sent = 5;
  bool already_interrupting = 6;
  bool already_terminal = 7;
  uint64 last_event_id = 8;
}

enum WorkflowLifecycle {
  WORKFLOW_LIFECYCLE_UNSPECIFIED = 0;
  WORKFLOW_LIFECYCLE_NOT_FOUND = 1;
  WORKFLOW_LIFECYCLE_INITIALIZING = 2;
  WORKFLOW_LIFECYCLE_READY = 3;
  WORKFLOW_LIFECYCLE_UPDATE_STAGED = 4;
  WORKFLOW_LIFECYCLE_RESTARTING = 5;
  WORKFLOW_LIFECYCLE_DELETING = 6;
  WORKFLOW_LIFECYCLE_FAILED = 7;
  WORKFLOW_LIFECYCLE_DISABLED = 8;
}

enum WorkflowMcpReloadState {
  WORKFLOW_MCP_RELOAD_STATE_UNSPECIFIED = 0;
  WORKFLOW_MCP_RELOAD_STATE_NOT_REQUESTED = 1;
  WORKFLOW_MCP_RELOAD_STATE_APPLIED = 2;
  WORKFLOW_MCP_RELOAD_STATE_RESTART_REQUIRED = 3;
  WORKFLOW_MCP_RELOAD_STATE_FAILED = 4;
  WORKFLOW_MCP_RELOAD_STATE_UNSUPPORTED = 5;
}

enum WorkflowOutcomeCategory {
  WORKFLOW_OUTCOME_CATEGORY_UNSPECIFIED = 0;
  WORKFLOW_OUTCOME_CATEGORY_INVALID_ARGUMENT = 1;
  WORKFLOW_OUTCOME_CATEGORY_UNAUTHENTICATED = 2;
  WORKFLOW_OUTCOME_CATEGORY_PERMISSION_DENIED = 3;
  WORKFLOW_OUTCOME_CATEGORY_NOT_FOUND = 4;
  WORKFLOW_OUTCOME_CATEGORY_FAILED_PRECONDITION = 5;
  WORKFLOW_OUTCOME_CATEGORY_ABORTED = 6;
  WORKFLOW_OUTCOME_CATEGORY_UNSUPPORTED = 7;
  WORKFLOW_OUTCOME_CATEGORY_UNAVAILABLE = 8;
  WORKFLOW_OUTCOME_CATEGORY_UNKNOWN = 9;
  WORKFLOW_OUTCOME_CATEGORY_OUT_OF_RANGE = 10;
  WORKFLOW_OUTCOME_CATEGORY_DEADLINE_EXCEEDED = 11;
  WORKFLOW_OUTCOME_CATEGORY_CANCELLED = 12;
  WORKFLOW_OUTCOME_CATEGORY_INTERNAL = 13;
}

enum WorkflowErrorCode {
  WORKFLOW_ERROR_CODE_UNSPECIFIED = 0;
  WORKFLOW_ERROR_CODE_GATEWAY_UNAVAILABLE = 1;
  WORKFLOW_ERROR_CODE_INVALID_WORKFLOW_PACKAGE = 2;
  WORKFLOW_ERROR_CODE_EMPTY_PROMPT = 3;
  WORKFLOW_ERROR_CODE_RESTART_REQUIRED = 4;
  WORKFLOW_ERROR_CODE_REPLAY_UNAVAILABLE = 5;
  WORKFLOW_ERROR_CODE_MCP_NOT_REACHABLE = 6;
  WORKFLOW_ERROR_CODE_MCP_UNAVAILABLE = 7;
  WORKFLOW_ERROR_CODE_WORKFLOW_NOT_FOUND = 8;
  WORKFLOW_ERROR_CODE_ACTIVE_WORK_REFUSED = 9;
  WORKFLOW_ERROR_CODE_PACKAGE_LIMIT_EXCEEDED = 10;
  WORKFLOW_ERROR_CODE_AUTH_REQUIRED = 11;
  WORKFLOW_ERROR_CODE_PERMISSION_DENIED = 12;
}

message StartChatRunRequest {
  ChatRuntimeContext context = 1;
  string prompt = 2;
  repeated ContextBlock context_blocks = 3;
  string client_message_id = 4;
  string idempotency_key = 5;
  map<string, string> ui_correlation_metadata = 6;
}

message StartChatRunResponse {
  string chat_id = 1;
  string run_id = 2;
  string session_group_id = 3;
  string workspace_id = 4;
  ChatStatus status = 5;
  uint64 last_event_id = 6;
  string event_cursor = 7;
  bool first_turn_accepted = 8;
  ChatCapabilitySet capabilities = 9;
}

message GetChatRequest {
  ChatRuntimeContext context = 1;
  string chat_id = 2;
}

message GetChatResponse {
  Chat chat = 1;
  ChatStatus status = 2;
}

message RunChatTurnRequest {
  ChatRuntimeContext context = 1;
  string chat_id = 2;
  string prompt = 3;
  repeated ContextBlock context_blocks = 4;
  string client_message_id = 5;
  string idempotency_key = 6;
}

message RunChatTurnResponse {
  string chat_id = 1;
  string run_id = 2;
  string session_group_id = 3;
  string workspace_id = 4;
  ChatStatus status = 5;
  uint64 last_event_id = 6;
  string event_cursor = 7;
  bool turn_accepted = 8;
}

message GetChatStatusRequest {
  ChatRuntimeContext context = 1;
  string chat_id = 2;
}

message GetChatStatusResponse {
  ChatStatus status = 1;
}

message GetChatHistoryRequest {
  ChatRuntimeContext context = 1;
  string chat_id = 2;
  ChatHistoryDepth requested_depth = 3;
  string cursor = 4;
  uint32 limit = 5;
  ChatHistorySortDirection sort_direction = 6;
}

message GetChatHistoryResponse {
  string chat_id = 1;
  repeated ChatTurnSummary turns = 2;
  string next_cursor = 3;
  string backwards_cursor = 4;
  ChatHistoryDepth returned_depth = 5;
  ChatCapabilityState capability = 6;
  ChatNarrowedOutcome narrowed = 7;
}

message StreamChatEventsRequest {
  ChatRuntimeContext context = 1;
  string chat_id = 2;
  oneof cursor {
    ChatFromStartCursor from_start = 3;
    uint64 after_event_id = 4;
    string after_event_cursor = 5;
  }
  string client_subscriber_id = 6;
}

message ChatFromStartCursor {}

message StreamChatEventsResponse {
  oneof payload {
    ChatEvent event = 1;
    ChatReplayNotice replay_notice = 2;
    ChatNarrowedOutcome narrowed = 3;
  }
}

message RespondChatPendingRequest {
  ChatRuntimeContext context = 1;
  string chat_id = 2;
  string pending_request_id = 3;
  string client_response_id = 4;
  string idempotency_key = 5;
  oneof response {
    ApprovalPendingResponse approval = 6;
    PermissionsPendingResponse permissions = 7;
    McpElicitationPendingResponse mcp_elicitation = 8;
    ToolUserInputPendingResponse tool_user_input = 9;
  }
}

message RespondChatPendingResponse {
  string chat_id = 1;
  string run_id = 2;
  string pending_request_id = 3;
  string client_response_id = 4;
  bool accepted = 5;
  bool already_applied = 6;
  uint64 last_event_id = 7;
  ChatStatus status = 8;
}

message InterruptChatRunRequest {
  ChatRuntimeContext context = 1;
  string chat_id = 2;
  string run_id = 3;
  string client_request_id = 4;
  string idempotency_key = 5;
}

message InterruptChatRunResponse {
  string chat_id = 1;
  string run_id = 2;
  ChatStatus status = 3;
  bool interrupt_sent = 4;
  bool already_interrupting = 5;
  bool already_terminal = 6;
  uint64 last_event_id = 7;
}

message Chat {
  string chat_id = 1;
  string session_group_id = 2;
  string workspace_id = 3;
  ChatThreadLifecycle thread_lifecycle = 4;
  int64 created_at_unix_ms = 5;
  int64 updated_at_unix_ms = 6;
  string preview = 7;
  bool ephemeral = 8;
  ChatCapabilitySet capabilities = 9;
}

message ChatStatus {
  string chat_id = 1;
  string session_group_id = 2;
  string workspace_id = 3;
  ChatThreadLookupState lookup = 4;
  ChatThreadLifecycle thread_lifecycle = 5;
  ChatTurnLifecycle current_run_lifecycle = 6;
  string current_run_id = 7;
  string last_run_id = 8;
  ChatCapabilitySet capabilities = 9;
  ChatGatewayLocalState gateway_local = 10;
  repeated ChatPendingRequest active_pending_requests = 11;
  ChatTerminal terminal = 12;
  uint64 last_event_id = 13;
}

message ChatCapabilitySet {
  ChatCapabilityState status = 1;
  ChatCapabilityState history = 2;
  ChatCapabilityState event_stream = 3;
  ChatCapabilityState replay = 4;
  ChatCapabilityState pending = 5;
  ChatCapabilityState interrupt = 6;
}

message ChatGatewayLocalState {
  repeated ChatGatewayLocalSignal signals = 1;
  string process_epoch = 2;
}

message ChatPendingRequest {
  string pending_request_id = 1;
  string chat_id = 2;
  string run_id = 3;
  PendingType pending_type = 4;
  int64 created_at_unix_ms = 5;
  string item_id = 6;
  PendingRequestDisplay display = 7;
}

message ChatTurnSummary {
  string run_id = 1;
  ChatTurnLifecycle lifecycle = 2;
  ChatTurnItemsView items_view = 3;
  int64 started_at_unix_ms = 4;
  int64 completed_at_unix_ms = 5;
  int64 duration_ms = 6;
  string user_message_id = 7;
  string assistant_message_id = 8;
  string summary = 9;
  bool truncated = 10;
  ChatErrorSummary error = 11;
}

message ChatEvent {
  uint64 event_id = 1;
  string event_cursor = 2;
  string chat_id = 3;
  string session_group_id = 4;
  string workspace_id = 5;
  string run_id = 6;
  int64 created_at_unix_ms = 7;
  oneof payload {
    ChatLifecycleEvent lifecycle = 8;
    AssistantDeltaEvent assistant_delta = 9;
    AssistantMessageCompletedEvent assistant_message_completed = 10;
    PlanUpdatedEvent plan_updated = 11;
    ToolProgressEvent tool_progress = 12;
    CommandStartedEvent command_started = 13;
    CommandOutputDeltaEvent command_output_delta = 14;
    FileDiffUpdatedEvent file_diff_updated = 15;
    TurnDiffUpdatedEvent turn_diff_updated = 16;
    ChatPendingCreatedEvent pending_request_created = 17;
    ChatPendingResolvedEvent pending_request_resolved = 18;
    ChatTerminalEvent terminal = 19;
    GatewayWarningEvent gateway_warning = 20;
    ChatStatusUpdatedEvent status_updated = 21;
  }
}

message ChatLifecycleEvent {
  ChatLifecycleEventType lifecycle_event = 1;
  ChatThreadLifecycle thread_lifecycle = 2;
  ChatTurnLifecycle turn_lifecycle = 3;
  string reason_code = 4;
  string display_message = 5;
}

message ChatStatusUpdatedEvent {
  ChatStatus status = 1;
}

message ChatPendingCreatedEvent {
  ChatPendingRequest pending_request = 1;
}

message ChatPendingResolvedEvent {
  string pending_request_id = 1;
  PendingType pending_type = 2;
  PendingResolution resolution = 3;
  string display_message = 4;
}

message ChatTerminalEvent {
  ChatTerminal terminal = 1;
}

message ChatTerminal {
  ChatTurnLifecycle terminal_lifecycle = 1;
  string result_summary = 2;
  string error_message = 3;
}

message ChatReplayNotice {
  ChatReplayNoticeCode code = 1;
  string message = 2;
  uint64 oldest_buffered_event_id = 3;
  uint64 newest_buffered_event_id = 4;
  bool from_start_available = 5;
  uint64 start_evicted_before_event_id = 6;
  string process_epoch = 7;
}

message ChatNarrowedOutcome {
  ChatOutcomeCategory outcome = 1;
  string reason = 2;
  string display_message = 3;
  ChatCapabilityState requested = 4;
  ChatCapabilityState returned = 5;
  bool retryable = 6;
}

message ChatErrorSummary {
  string reason = 1;
  string display_message = 2;
  bool retryable = 3;
}

message ChatRuntimeErrorDetails {
  ChatOutcomeCategory outcome = 1;
  string reason = 2;
  string display_message = 3;
  string chat_id = 4;
  string run_id = 5;
  string session_group_id = 6;
  string pending_request_id = 7;
  string idempotency_key = 8;
  bool retryable = 9;
}

enum ChatThreadLookupState {
  CHAT_THREAD_LOOKUP_STATE_UNSPECIFIED = 0;
  CHAT_THREAD_LOOKUP_STATE_VALID = 1;
  CHAT_THREAD_LOOKUP_STATE_INVALID = 2;
  CHAT_THREAD_LOOKUP_STATE_NOT_FOUND = 3;
  CHAT_THREAD_LOOKUP_STATE_CODEX_UNAVAILABLE = 4;
  CHAT_THREAD_LOOKUP_STATE_UNAUTHORIZED = 5;
  CHAT_THREAD_LOOKUP_STATE_UNKNOWN = 6;
}

enum ChatThreadLifecycle {
  CHAT_THREAD_LIFECYCLE_UNSPECIFIED = 0;
  CHAT_THREAD_LIFECYCLE_NOT_LOADED = 1;
  CHAT_THREAD_LIFECYCLE_IDLE = 2;
  CHAT_THREAD_LIFECYCLE_ACTIVE_RUNNING = 3;
  CHAT_THREAD_LIFECYCLE_WAITING_ON_APPROVAL = 4;
  CHAT_THREAD_LIFECYCLE_WAITING_ON_USER_INPUT = 5;
  CHAT_THREAD_LIFECYCLE_SYSTEM_ERROR = 6;
  CHAT_THREAD_LIFECYCLE_UNKNOWN = 7;
}

enum ChatTurnLifecycle {
  CHAT_TURN_LIFECYCLE_UNSPECIFIED = 0;
  CHAT_TURN_LIFECYCLE_IN_PROGRESS = 1;
  CHAT_TURN_LIFECYCLE_COMPLETED = 2;
  CHAT_TURN_LIFECYCLE_INTERRUPTED = 3;
  CHAT_TURN_LIFECYCLE_FAILED = 4;
  CHAT_TURN_LIFECYCLE_TURN_UNKNOWN = 5;
  CHAT_TURN_LIFECYCLE_TURN_UNAVAILABLE = 6;
}

enum ChatCapabilityState {
  CHAT_CAPABILITY_STATE_UNSPECIFIED = 0;
  CHAT_CAPABILITY_STATE_SUPPORTED = 1;
  CHAT_CAPABILITY_STATE_UNSUPPORTED = 2;
  CHAT_CAPABILITY_STATE_UNAVAILABLE = 3;
  CHAT_CAPABILITY_STATE_UNKNOWN = 4;
  CHAT_CAPABILITY_STATE_NARROWED = 5;
}

enum ChatGatewayLocalSignal {
  CHAT_GATEWAY_LOCAL_SIGNAL_UNSPECIFIED = 0;
  CHAT_GATEWAY_LOCAL_SIGNAL_LIVE = 1;
  CHAT_GATEWAY_LOCAL_SIGNAL_REPLAY_AVAILABLE = 2;
  CHAT_GATEWAY_LOCAL_SIGNAL_REPLAY_UNAVAILABLE = 3;
  CHAT_GATEWAY_LOCAL_SIGNAL_PENDING_KNOWN = 4;
  CHAT_GATEWAY_LOCAL_SIGNAL_PENDING_UNAVAILABLE_AFTER_RESTART = 5;
  CHAT_GATEWAY_LOCAL_SIGNAL_IDEMPOTENCY_UNAVAILABLE_AFTER_RESTART = 6;
}

enum ChatHistoryDepth {
  CHAT_HISTORY_DEPTH_UNSPECIFIED = 0;
  CHAT_HISTORY_DEPTH_TURN_SUMMARY = 1;
  CHAT_HISTORY_DEPTH_ITEM_LEVEL = 2;
}

enum ChatTurnItemsView {
  CHAT_TURN_ITEMS_VIEW_UNSPECIFIED = 0;
  CHAT_TURN_ITEMS_VIEW_NOT_LOADED = 1;
  CHAT_TURN_ITEMS_VIEW_SUMMARY = 2;
  CHAT_TURN_ITEMS_VIEW_FULL_UNSUPPORTED = 3;
}

enum ChatHistorySortDirection {
  CHAT_HISTORY_SORT_DIRECTION_UNSPECIFIED = 0;
  CHAT_HISTORY_SORT_DIRECTION_ASCENDING = 1;
  CHAT_HISTORY_SORT_DIRECTION_DESCENDING = 2;
}

enum ChatLifecycleEventType {
  CHAT_LIFECYCLE_EVENT_TYPE_UNSPECIFIED = 0;
  CHAT_LIFECYCLE_EVENT_TYPE_CHAT_STARTED = 1;
  CHAT_LIFECYCLE_EVENT_TYPE_RUN_STARTED = 2;
  CHAT_LIFECYCLE_EVENT_TYPE_STATE_CHANGED = 3;
}

enum ChatReplayNoticeCode {
  CHAT_REPLAY_NOTICE_CODE_UNSPECIFIED = 0;
  CHAT_REPLAY_NOTICE_CODE_START_EVICTED = 1;
  CHAT_REPLAY_NOTICE_CODE_CURSOR_EVICTED = 2;
  CHAT_REPLAY_NOTICE_CODE_UNAVAILABLE_AFTER_RESTART = 3;
  CHAT_REPLAY_NOTICE_CODE_NARROWED_TO_LIVE = 4;
}

enum ChatOutcomeCategory {
  CHAT_OUTCOME_CATEGORY_UNSPECIFIED = 0;
  CHAT_OUTCOME_CATEGORY_INVALID_ARGUMENT = 1;
  CHAT_OUTCOME_CATEGORY_UNAUTHENTICATED = 2;
  CHAT_OUTCOME_CATEGORY_PERMISSION_DENIED = 3;
  CHAT_OUTCOME_CATEGORY_NOT_FOUND = 4;
  CHAT_OUTCOME_CATEGORY_FAILED_PRECONDITION = 5;
  CHAT_OUTCOME_CATEGORY_ABORTED = 6;
  CHAT_OUTCOME_CATEGORY_UNSUPPORTED = 7;
  CHAT_OUTCOME_CATEGORY_UNAVAILABLE = 8;
  CHAT_OUTCOME_CATEGORY_UNKNOWN = 9;
  CHAT_OUTCOME_CATEGORY_OUT_OF_RANGE = 10;
  CHAT_OUTCOME_CATEGORY_NARROWED = 11;
  CHAT_OUTCOME_CATEGORY_DEADLINE_EXCEEDED = 12;
  CHAT_OUTCOME_CATEGORY_CANCELLED = 13;
  CHAT_OUTCOME_CATEGORY_INTERNAL = 14;
}

message StartTaskRequest {
  string session_group_id = 1;
  string workspace_id = 2;
  string prompt = 3;
  repeated ContextBlock context_blocks = 4;
  string thread_id = 5;
  string client_message_id = 6;
  map<string, string> ui_correlation_metadata = 7;
}

message ContextBlock {
  ContextBlockKind kind = 1;
  string source_label = 2;
  string source_uri = 3;
  string mime_type = 4;
  string content = 5;
}

enum ContextBlockKind {
  CONTEXT_BLOCK_KIND_UNSPECIFIED = 0;
  CONTEXT_BLOCK_KIND_APPLICATION = 1;
  CONTEXT_BLOCK_KIND_UNTRUSTED = 2;
}

message StartTaskResponse {
  string task_id = 1;
  string thread_id = 2;
  string turn_id = 3;
  string session_group_id = 4;
  TaskState state = 5;
  uint64 last_event_id = 6;
}

message StreamTaskRequest {
  string task_id = 1;
  oneof cursor {
    FromStartCursor from_start = 2;
    uint64 after_event_id = 3;
  }
  string client_subscriber_id = 4;
}

message FromStartCursor {}

message StreamTaskResponse {
  oneof payload {
    TaskEvent event = 1;
    ReplayNotice replay_notice = 2;
  }
}

message ReplayNotice {
  ReplayNoticeCode code = 1;
  string message = 2;
  uint64 oldest_buffered_event_id = 3;
  uint64 newest_buffered_event_id = 4;
  bool from_start_available = 5;
  uint64 start_evicted_before_event_id = 6;
}

enum ReplayNoticeCode {
  REPLAY_NOTICE_CODE_UNSPECIFIED = 0;
  REPLAY_NOTICE_CODE_START_EVICTED = 1;
  REPLAY_NOTICE_CODE_CURSOR_EVICTED = 2;
}

message TaskEvent {
  reserved 21;

  uint64 event_id = 1;
  string task_id = 2;
  string session_group_id = 3;
  string workspace_id = 4;
  string thread_id = 5;
  string turn_id = 6;
  int64 created_at_unix_ms = 7;
  oneof payload {
    TaskLifecycleEvent lifecycle = 8;
    AssistantDeltaEvent assistant_delta = 9;
    AssistantMessageCompletedEvent assistant_message_completed = 10;
    PlanUpdatedEvent plan_updated = 11;
    ToolProgressEvent tool_progress = 12;
    CommandStartedEvent command_started = 13;
    CommandOutputDeltaEvent command_output_delta = 14;
    FileDiffUpdatedEvent file_diff_updated = 15;
    TurnDiffUpdatedEvent turn_diff_updated = 16;
    PendingRequestCreatedEvent pending_request_created = 17;
    PendingRequestResolvedEvent pending_request_resolved = 18;
    TaskTerminalEvent terminal = 19;
    GatewayWarningEvent gateway_warning = 20;
  }
}

message TaskLifecycleEvent {
  TaskLifecycleEventType lifecycle_event = 1;
  TaskState state = 2;
  string reason_code = 3;
  string display_message = 4;
}

enum TaskLifecycleEventType {
  TASK_LIFECYCLE_EVENT_TYPE_UNSPECIFIED = 0;
  TASK_LIFECYCLE_EVENT_TYPE_TASK_STARTED = 1;
  TASK_LIFECYCLE_EVENT_TYPE_THREAD_STARTED = 2;
  TASK_LIFECYCLE_EVENT_TYPE_TURN_STARTED = 3;
  TASK_LIFECYCLE_EVENT_TYPE_STATE_CHANGED = 4;
}

enum TaskState {
  TASK_STATE_UNSPECIFIED = 0;
  TASK_STATE_STARTING = 1;
  TASK_STATE_RUNNING = 2;
  TASK_STATE_WAITING_FOR_PENDING_REQUEST = 3;
  TASK_STATE_INTERRUPTING = 4;
  TASK_STATE_COMPLETED = 5;
  TASK_STATE_FAILED = 6;
  TASK_STATE_INTERRUPTED = 7;
}

message AssistantDeltaEvent {
  string text_delta = 1;
  bool truncated = 2;
}

message AssistantMessageCompletedEvent {
  string message = 1;
  bool truncated = 2;
}

message PlanUpdatedEvent {
  string explanation = 1;
  repeated PlanStep steps = 2;
}

message PlanStep {
  string step = 1;
  string status = 2;
}

message ToolProgressEvent {
  string item_id = 1;
  string tool_name = 2;
  ToolState state = 3;
  string summary = 4;
}

enum ToolState {
  TOOL_STATE_UNSPECIFIED = 0;
  TOOL_STATE_STARTED = 1;
  TOOL_STATE_RUNNING = 2;
  TOOL_STATE_COMPLETED = 3;
  TOOL_STATE_FAILED = 4;
}

message CommandStartedEvent {
  string item_id = 1;
  string command_display = 2;
  string workspace_label = 3;
}

message CommandOutputDeltaEvent {
  string item_id = 1;
  CommandOutputStream stream = 2;
  string delta = 3;
  bool truncated = 4;
}

enum CommandOutputStream {
  COMMAND_OUTPUT_STREAM_UNSPECIFIED = 0;
  COMMAND_OUTPUT_STREAM_COMBINED = 1;
}

message FileDiffUpdatedEvent {
  string item_id = 1;
  string file_label = 2;
  string change_kind = 3;
  string diff_summary = 4;
  string diff_unified = 5;
  bool truncated = 6;
}

message TurnDiffUpdatedEvent {
  string diff_summary = 1;
  string diff_unified = 2;
  bool truncated = 3;
}

message PendingRequestCreatedEvent {
  string pending_request_id = 1;
  PendingType pending_type = 2;
  PendingRequestDisplay display = 3;
}

message PendingRequestResolvedEvent {
  string pending_request_id = 1;
  PendingType pending_type = 2;
  PendingResolution resolution = 3;
  string display_message = 4;
}

message TaskTerminalEvent {
  TerminalState terminal_state = 1;
  string result_summary = 2;
  string error_message = 3;
}

enum TerminalState {
  TERMINAL_STATE_UNSPECIFIED = 0;
  TERMINAL_STATE_COMPLETED = 1;
  TERMINAL_STATE_FAILED = 2;
  TERMINAL_STATE_INTERRUPTED = 3;
}

message GatewayWarningEvent {
  string code = 1;
  string message = 2;
  string request_type = 3;
  string auto_resolution = 4;
  string limit_reason = 5;
}

message PendingRequest {
  string pending_request_id = 1;
  string task_id = 2;
  PendingType pending_type = 3;
  int64 created_at_unix_ms = 4;
  string thread_id = 5;
  string turn_id = 6;
  string item_id = 7;
  PendingRequestDisplay display = 8;
}

enum PendingType {
  PENDING_TYPE_UNSPECIFIED = 0;
  PENDING_TYPE_COMMAND_APPROVAL = 1;
  PENDING_TYPE_FILE_CHANGE_APPROVAL = 2;
  PENDING_TYPE_PERMISSIONS_APPROVAL = 3;
  PENDING_TYPE_MCP_ELICITATION = 4;
  PENDING_TYPE_TOOL_USER_INPUT = 5;
}

enum PendingResolution {
  PENDING_RESOLUTION_UNSPECIFIED = 0;
  PENDING_RESOLUTION_ACCEPTED = 1;
  PENDING_RESOLUTION_DECLINED = 2;
  PENDING_RESOLUTION_CANCELLED = 3;
  PENDING_RESOLUTION_GRANTED = 4;
  PENDING_RESOLUTION_DENIED = 5;
  PENDING_RESOLUTION_ANSWERED = 6;
  PENDING_RESOLUTION_EXPIRED = 7;
  PENDING_RESOLUTION_CLEARED = 8;
  PENDING_RESOLUTION_FAILED = 9;
}

message PendingRequestDisplay {
  oneof payload {
    CommandApprovalDisplay command_approval = 1;
    FileChangeApprovalDisplay file_change_approval = 2;
    PermissionsApprovalDisplay permissions_approval = 3;
    McpElicitationDisplay mcp_elicitation = 4;
    ToolUserInputDisplay tool_user_input = 5;
  }
}

message CommandApprovalDisplay {
  string command_display = 1;
  string workspace_label = 2;
  string reason = 3;
  ApprovalSecurityMetadata approval_security = 4;
  repeated ApprovalDecisionOption decision_options = 5;
}

message FileChangeApprovalDisplay {
  string file_label = 1;
  string change_kind = 2;
  string diff_summary = 3;
  string diff_unified = 4;
  FileGrantRootDisplay grant_root = 5;
  repeated ApprovalDecisionOption decision_options = 6;
  bool diff_unavailable = 7;
}

message PermissionsApprovalDisplay {
  repeated PermissionAtom requested_permissions = 1;
  PermissionScope recommended_scope = 2;
  string reason = 3;
}

message PermissionAtom {
  string permission_id = 1;
  string kind = 2;
  string display_label = 3;
  string scope_label = 4;
  bool grantable = 5;
  string ungrantable_reason = 6;
}

enum PermissionScope {
  PERMISSION_SCOPE_UNSPECIFIED = 0;
  PERMISSION_SCOPE_TURN = 1;
  PERMISSION_SCOPE_SESSION = 2;
}

message McpElicitationDisplay {
  ElicitationMode mode = 1;
  string message = 2;
  string form_schema_json = 3;
  string url = 4;
  string submit_label = 5;
}

enum ElicitationMode {
  ELICITATION_MODE_UNSPECIFIED = 0;
  ELICITATION_MODE_FORM = 1;
  ELICITATION_MODE_URL = 2;
}

message ToolUserInputDisplay {
  repeated ToolUserInputQuestion questions = 1;
}

message ToolUserInputQuestion {
  string id = 1;
  string header = 2;
  string question = 3;
  bool is_other = 4;
  bool is_secret = 5;
  repeated string options = 6;
}

message ApprovalSecurityMetadata {
  bool has_privilege_expansion = 1;
  NetworkContextDisplay network_context = 2;
  AdditionalNetworkDisplay additional_network = 3;
  repeated AdditionalFilesystemEntry additional_filesystem_entries = 4;
  ExecPolicyAmendmentSummary execpolicy_amendment_summary = 5;
  repeated NetworkPolicyAmendmentSummary network_policy_amendment_summaries = 6;
  string blocking_reason = 7;
}

message NetworkContextDisplay {
  string host_label = 1;
  string protocol = 2;
}

message AdditionalNetworkDisplay {
  bool enabled = 1;
}

message AdditionalFilesystemEntry {
  string entry_id = 1;
  string access = 2;
  string path_label = 3;
  bool approvable = 4;
  string unapprovable_reason = 5;
}

message ExecPolicyAmendmentSummary {
  string command_display = 1;
  bool truncated = 2;
}

message NetworkPolicyAmendmentSummary {
  string host_label = 1;
  string action = 2;
  bool approvable = 3;
}

message FileGrantRootDisplay {
  bool present = 1;
  string root_label = 2;
  bool under_configured_cwd = 3;
  bool approvable = 4;
  string unapprovable_reason = 5;
}

message ApprovalDecisionOption {
  string decision_id = 1;
  ApprovalWireDecision wire_decision = 2;
  string display_label = 3;
  string summary = 4;
  bool selectable = 5;
  string unsupported_reason = 6;
}

enum ApprovalWireDecision {
  APPROVAL_WIRE_DECISION_UNSPECIFIED = 0;
  APPROVAL_WIRE_DECISION_ACCEPT = 1;
  APPROVAL_WIRE_DECISION_ACCEPT_FOR_SESSION = 2;
  APPROVAL_WIRE_DECISION_DECLINE = 3;
  APPROVAL_WIRE_DECISION_CANCEL = 4;
}

message GetTaskStatusRequest {
  oneof locator {
    string task_id = 1;
    ClientMessageTaskLocator client_message_locator = 2;
    ThreadTaskLocator thread_locator = 3;
  }
}

message ClientMessageTaskLocator {
  string session_group_id = 1;
  string client_message_id = 2;
}

message ThreadTaskLocator {
  string session_group_id = 1;
  string thread_id = 2;
}

message GetTaskStatusResponse {
  string task_id = 1;
  TaskState state = 2;
  string session_group_id = 3;
  string workspace_id = 4;
  string thread_id = 5;
  string turn_id = 6;
  uint64 last_event_id = 7;
  uint64 oldest_buffered_event_id = 8;
  uint64 newest_buffered_event_id = 9;
  bool from_start_available = 10;
  uint64 start_evicted_before_event_id = 11;
  repeated PendingRequest active_pending_requests = 12;
  TaskTerminalEvent terminal = 13;
}

message RespondPendingRequestRequest {
  string task_id = 1;
  string pending_request_id = 2;
  string client_response_id = 3;
  oneof response {
    ApprovalPendingResponse approval = 4;
    PermissionsPendingResponse permissions = 5;
    McpElicitationPendingResponse mcp_elicitation = 6;
    ToolUserInputPendingResponse tool_user_input = 7;
  }
}

message ApprovalPendingResponse {
  string decision_id = 1;
}

message PermissionsPendingResponse {
  repeated string permission_ids = 1;
  PermissionScope scope = 2;
  bool strict_auto_review = 3;
}

message McpElicitationPendingResponse {
  McpElicitationAction action = 1;
  string content_json = 2;
}

enum McpElicitationAction {
  MCP_ELICITATION_ACTION_UNSPECIFIED = 0;
  MCP_ELICITATION_ACTION_ACCEPT = 1;
  MCP_ELICITATION_ACTION_DECLINE = 2;
  MCP_ELICITATION_ACTION_CANCEL = 3;
}

message ToolUserInputPendingResponse {
  repeated ToolUserInputAnswer answers = 1;
}

message ToolUserInputAnswer {
  string question_id = 1;
  repeated string answers = 2;
}

message RespondPendingRequestResponse {
  string task_id = 1;
  string pending_request_id = 2;
  string client_response_id = 3;
  bool accepted = 4;
  bool already_applied = 5;
  uint64 resolved_event_id = 6;
}

message InterruptTaskRequest {
  oneof locator {
    string task_id = 1;
    ClientMessageTaskLocator client_message_locator = 2;
  }
  string client_request_id = 3;
}

message InterruptTaskResponse {
  string task_id = 1;
  string session_group_id = 2;
  string thread_id = 3;
  string turn_id = 4;
  TaskState state = 5;
  bool interrupt_sent = 6;
  bool pre_turn_cancel_recorded = 7;
  bool already_interrupting = 8;
  bool already_terminal = 9;
  uint64 last_event_id = 10;
}

message GatewayErrorDetails {
  string reason = 1;
  string display_message = 2;
  string task_id = 3;
  string session_group_id = 4;
  string client_message_id = 5;
  string client_response_id = 6;
  string pending_request_id = 7;
  string thread_id = 8;
  bool retryable = 9;
}
